on:
  workflow_dispatch:
  push:
  pull_request:
  schedule:
  - cron: '0 * */1 * *'

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: true
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install cssmin
    - name: Set up Python, uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v5
      with:
        python-version: "3.12"
        activate-environment: "true"
    - name: Build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DEV: ${{ github.ref == 'refs/heads/master' && '0' || '1' }}
      run: |
        uv pip install -r requirements.txt
        ./build.sh
        cssmin > dist/theme.css.min < dist/theme.css
        mv dist/theme.css.min dist/theme.css
        echo "xemu.app" > dist/CNAME
    - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
      with:
        path: dist
  Deploy:
    if: github.ref == 'refs/heads/master'
    needs: [Build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
